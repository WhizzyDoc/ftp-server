<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local FTP File Manager</title>
  <script src="/static/tailwind.min.js"></script>
  <script src="/static/html5-qrcode.min.js"></script>
  <script src="/static/jquery.min.js"></script>
  
  
</head>
<body class="bg-gray-950 text-gray-100 h-screen overflow-hidden">

<div id="toast" class="fixed top-4 right-4 z-50 hidden bg-gray-800 text-white px-4 py-2 rounded shadow"></div>

<!-- LOGIN VIEW -->
<div id="loginView" class="flex items-center justify-center h-full">
  <div class="bg-gray-900 p-6 rounded-xl w-96 space-y-4">
    <h1 class="text-xl font-bold">Login to Server</h1>
    <input id="passwordInput" type="password" placeholder="Enter password"
      class="w-full p-2 rounded bg-gray-800 outline-none" />
    <button class="login-btn w-full bg-blue-600 p-2 rounded">Login</button>
    
    <button class="qr-btn w-full bg-gray-600 text-sm text-white-400 p-2 rounded">OR Scan QR Code</button>

    <div id="qr-reader" class="w-full"></div>
  </div>
</div>

<!-- APP VIEW -->
<div id="appView" class="hidden h-full flex flex-col">

  <!-- TOP BAR -->
  <div class="flex flex-wrap items-center gap-2 p-3 bg-gray-900">
    <button class="back-btn bg-gray-800 px-3 py-1 rounded">Back</button>
    <button class="download-btn bg-gray-800 px-3 py-1 rounded">Download</button>
    <button class="upload-btn bg-gray-800 px-3 py-1 rounded">Upload</button>
    <button class="delete-btn bg-red-600 px-3 py-1 rounded">Delete</button>
    <button class="open-btn bg-gray-800 px-3 py-1 rounded">Open</button>
    
    <button class="logout-btn bg-gray-700 px-3 py-1 rounded">Logout</button>

    <input id="pathBar" class="ml-auto bg-gray-800 px-2 py-1 rounded w-full" placeholder="/path..." value="" readonly />
    <button class="path-btn hidden bg-blue-600 px-3 py-1 rounded">Go</button>

  </div>

  <!-- TABLE -->
  <div class="flex-1 overflow-auto p-3">
    <table class="w-full text-sm">
      <thead class="text-left text-gray-400">
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Size</th>
        </tr>
      </thead>
      <tbody id="fileTable"></tbody>
    </table>
  </div>

  <!-- UPLOAD -->
  <input type="file" id="fileInput" class="hidden" />

  <!-- Upload Progress Modal -->
  <div id="uploadModal" class="fixed inset-0 bg-black/60  hidden items-center justify-center z-50">
    <div class="bg-gray-900 w-80 p-4 rounded-xl shadow-xl space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="text-sm font-semibold">Uploading...</h2>
        <span id="progressText" class="text-xs text-gray-400">0%</span>
      </div>
      <div class="w-full bg-gray-800 h-2 rounded overflow-hidden">
        <div id="progressBar" class="h-2 bg-green-500" style="width:0%"></div>
      </div>
      <p id="uploadFileName" class="text-xs text-gray-400 truncate"></p>
    </div>
  </div>
  
  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
  <div class="bg-gray-900 w-80 p-5 rounded-xl shadow-xl space-y-4">
    
    <h2 class="text-lg font-semibold text-red-500">Confirm Delete</h2>
    
    <p class="text-sm text-gray-300">
      Are you sure you want to delete 
      <span id="deleteItemName" class="font-semibold text-white"></span>?
    </p>

    <div class="flex justify-end gap-2">
      <button onclick="closeDeleteModal()" 
        class="px-3 py-1 rounded bg-gray-700 hover:bg-gray-600">
        Cancel
      </button>

      <button onclick="confirmDelete()" 
        class="px-3 py-1 rounded bg-red-600 hover:bg-red-500">
        Delete
      </button>
    </div>

  </div>
</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
